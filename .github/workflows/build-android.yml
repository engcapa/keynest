name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty to only build the APK as a workflow artifact.'
        required: false
        default: ''

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [ -n "${GITHUB_REF#refs/tags/}" ] && [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/}" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG=""
          fi
          if [ -n "$TAG" ]; then
            APP_VERSION="${TAG#v}"
            node -e "const fs=require('fs');const p='./app.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.expo.version='${APP_VERSION}';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"
            echo "Synced app.json version to ${APP_VERSION} from tag ${TAG}"
          else
            APP_VERSION=$(node -p "require('./app.json').expo.version")
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved app version: ${APP_VERSION}, tag: ${TAG}"

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Verify keynest-mysql local module linked
        run: |
          set -e
          node -e "require(require.resolve('expo-modules-autolinking', { paths: [require.resolve('expo/package.json')] }))(['resolve','--json','--platform','android'])" > /tmp/autolink.json
          if ! grep -q 'keynest-mysql' /tmp/autolink.json; then
            echo "keynest-mysql not found in autolinking output — local module was not discovered" >&2
            cat /tmp/autolink.json
            exit 1
          fi
          if ! grep -q 'multiDexEnabled' android/app/build.gradle; then
            echo "multiDexEnabled missing from android/app/build.gradle — config plugin did not fire" >&2
            exit 1
          fi
          echo "keynest-mysql autolinked, multiDex enabled"

      - name: Tune Gradle / Kotlin memory for CI
        working-directory: android
        run: |
          # The generated template defaults to two pressure points that are too
          # high for the standard ubuntu-latest runner:
          # 1. release R8/minify over the React Native + Expo + mysql-connector-j
          #    graph can exhaust the Gradle daemon heap;
          # 2. running R8/resource tasks concurrently leaves too little headroom
          #    for the daemon and its native file watcher.
          # Keep two worker slots for D8 dexing after R8 is disabled; forcing a
          # single slot makes :app:mergeExtDexRelease look hung on GitHub runners.
          #
          # Pin Kotlin to 1.9.24 to match the version shipped by
          # @react-native/gradle-plugin (gradle/libs.versions.toml: kotlin = "1.9.24"),
          # which is what actually drives the kotlin-gradle-plugin classpath.
          # The SDK 52 bare template's `android.kotlinVersion` only affects
          # expo-modules-core's ext.kotlinVersion (used to pick the Compose
          # Compiler extension). With 1.9.24 it resolves to Compose Compiler 1.5.14,
          # which matches the actual Kotlin compiler version and clears the
          # "Compose Compiler requires Kotlin version 1.9.25" error.
          sed -i -E '/^org\.gradle\.jvmargs=/d; /^org\.gradle\.workers\.max=/d; /^org\.gradle\.parallel=/d; /^org\.gradle\.vfs\.watch=/d; /^kotlin\.daemon\.jvmargs=/d; /^reactNativeArchitectures=/d; /^android\.kotlinVersion=/d; /^android\.r8\.maxHeapSize=/d; /^android\.enableProguardInReleaseBuilds=/d; /^android\.enableShrinkResourcesInReleaseBuilds=/d; /^android\.enablePngCrunchInReleaseBuilds=/d' gradle.properties
          # Expo's generated gradle.properties may not end with a newline.
          # Ensure appended CI properties start as real properties instead of
          # being concatenated onto android.extraMavenRepos.
          printf '\n' >> gradle.properties
          cat >> gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.workers.max=2
          org.gradle.parallel=false
          org.gradle.vfs.watch=false
          kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
          reactNativeArchitectures=arm64-v8a
          android.kotlinVersion=1.9.24
          android.enableProguardInReleaseBuilds=false
          android.enableShrinkResourcesInReleaseBuilds=false
          android.enablePngCrunchInReleaseBuilds=false
          EOF
          grep -qx 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8' gradle.properties
          echo "--- final gradle.properties ---"
          cat gradle.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --no-watch-fs --stacktrace --max-workers=2 -Pandroid.enableProguardInReleaseBuilds=false -Pandroid.enableShrinkResourcesInReleaseBuilds=false -x lintVitalRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          DEST="keynest-${{ steps.version.outputs.app_version }}.apk"
          cp "$APK_PATH" "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Built: $DEST ($(du -h "$DEST" | cut -f1))"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: keynest-android-${{ steps.version.outputs.app_version }}
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: steps.version.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Key Nest ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.apk_path }}
          fail_on_unmatched_files: true
