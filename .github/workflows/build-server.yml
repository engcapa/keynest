name: Build Server Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build server binaries
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: node20-linux-x64
            asset: keynest-server-linux-x64
          - target: node20-linux-arm64
            asset: keynest-server-linux-arm64
          - target: node20-macos-x64
            asset: keynest-server-macos-x64
          - target: node20-macos-arm64
            asset: keynest-server-macos-arm64
          - target: node20-win-x64
            asset: keynest-server-win-x64.exe
          - target: node20-win-arm64
            asset: keynest-server-win-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc --project tsconfig.server.json

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build binary
        run: |
          pkg server-dist/index.js \
            --target ${{ matrix.target }} \
            --output ${{ matrix.asset }} \
            --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          name: Key Nest ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
